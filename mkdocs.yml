site_name: 南哪助手应用教程汇总
site_description: 小破手今天搓代码了吗？
site_author: NannaHelper
site_url: https://nannahelper.github.io/docs/
docs_dir: docs

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.instant
    - content.code.copy
    - content.code.annotate

