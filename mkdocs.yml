extra:
  announce:
    content: |
      <p style="text-align:center; margin:0; font-size:1.05em">
        🎉 <strong>欢迎 2026 届新生！</strong> 🎉
      </p>
    dismiss: true

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.instant
    - content.code.copy
    - content.code.annotate

